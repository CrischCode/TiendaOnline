services:
  api:
    build: ./E-Commerce.API
    container_name: api-service
    ports:
      - "5000:8080"
    depends_on:
      - postgres
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=tiendaonline_db;Username=cristianchamo;Password=admin

  postgres:
    image: postgres:16
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: cristianchamo
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: tiendaonline_db
    ports:
      - "15432:5432" 
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: